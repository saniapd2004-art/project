<script>
  const secretNumber = 7;

  let guess = Number(prompt("Guess a number between 1 and 10"));

  if (guess === secretNumber) {
    alert("Correct!");
    console.log("Correct!");
  } else {
    alert("Wrong! The number was " + secretNumber);
    console.log("Wrong!");
  }
</script>

</body>
